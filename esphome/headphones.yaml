# GPIO32 (Internal Pull-up): headphones_detector_1
# GPIO33 (Internal Pull-up): headphones_detector_2
# GPIO17 (Internal Pull-up): headphones_detector_3
# GPIO36 (Input only, No Pull-up): headphones_detector_4
# GPIO14 (Internal Pull-up): headphones_detector_5
# GPIO04 (Internal Pull-up): headphones_detector_6
# GPIO39 (Input only, No Pull-up): 
# GPIO35 (Input only, No Pull-up): 

binary_sensor:
    
  - platform: gpio
    pin:
      number: GPIO32
      mode: INPUT_PULLUP
      inverted: True
    id: headphones_detector_1
    name: "Headphones detector 1"
    device_class: occupancy
    filters:
      - delayed_on: $on_delay
      - delayed_off: $off_delay

  - platform: gpio
    pin:
      number: GPIO33
      mode: INPUT_PULLUP
      inverted: True
    id: headphones_detector_2
    name: "Headphones detector 2"
    device_class: occupancy
    filters:
      - delayed_on: $on_delay
      - delayed_off: $off_delay   

  - platform: gpio
    pin:
      number: GPIO17
      mode: INPUT_PULLUP
      inverted: True
    id: headphones_detector_3
    name: "Headphones detector 3"
    device_class: occupancy
    filters:
      - delayed_on: $on_delay
      - delayed_off: $off_delay        

  - platform: gpio
    pin:
      number: GPIO36
      inverted: True
    id: headphones_detector_4
    name: "Headphones detector 4"
    device_class: occupancy
    filters:
      - delayed_on: $on_delay
      - delayed_off: $off_delay  

  - platform: gpio
    pin:
      number: GPIO14
      mode: INPUT_PULLUP
      inverted: True
    id: pipe_detector_5
    name: "Headphones detector 5"
    device_class: occupancy
    filters:
      - delayed_on: $on_delay
      - delayed_off: $off_delay 

  - platform: gpio
    pin:
      number: GPIO04
      mode: INPUT_PULLUP
      inverted: True
    id: pipe_detector_6
    name: "Headphones detector 6"
    device_class: occupancy
    filters:
      - delayed_on: $on_delay
      - delayed_off: $off_delay           

  - platform: status
    name: "Headphones status"

switch:
  - platform: restart
    name: "Headphones restart"
     
text_sensor:
  - platform: template
    name: Headphones uptime
    lambda: |-
      int seconds = (id(uptime_sec).state);
      int days = seconds / (24 * 3600);
      seconds = seconds % (24 * 3600); 
      int hours = seconds / 3600;
      seconds = seconds % 3600;
      int minutes = seconds /  60;
      seconds = seconds % 60;
      return { (std::to_string(days) +"d " + std::to_string(hours) +"h " + std::to_string(minutes) +"m "+ std::to_string(seconds) +"s") };
    icon: mdi:clock-start
    update_interval: 33s