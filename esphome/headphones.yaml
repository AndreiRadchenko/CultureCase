substitutions:
  device_ip: 192.168.1.11
  network_gateway: 192.168.1.1
  network_subnet: 255.255.255.0
  on_delay: 0.3s
  off_delay: 0.3s

esphome:
  name: headphones
  friendly_name: headphones

esp32:
  board: wt32-eth01
  framework:
    type: esp-idf

ethernet:
  type: LAN8720
  mdc_pin: GPIO23
  mdio_pin: GPIO18
  clk:
    pin: GPIO0
    mode: CLK_EXT_IN
  phy_addr: 1
  power_pin: GPIO16
  manual_ip:
    static_ip: $device_ip
    gateway: $network_gateway
    subnet: $network_subnet

