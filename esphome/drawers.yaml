substitutions:
  device_ip: 192.168.1.12
  network_gateway: 192.168.1.1
  network_subnet: 255.255.255.0
  on_delay: 0.3s
  off_delay: 0.3s

esphome:
  name: drawers
  friendly_name: drawers

esp32:
  board: wt32-eth01
  framework:
    type: esp-idf

# Enable logging
logger:

ethernet:
  type: LAN8720
  mdc_pin: GPIO23
  mdio_pin: GPIO18
  clk:
    pin: GPIO0
    mode: CLK_EXT_IN
  phy_addr: 1
  power_pin: GPIO16
  manual_ip:
    static_ip: $device_ip
    gateway: $network_gateway
    subnet: $network_subnet

# Enable Home Assistant API
api:
  encryption:
    key: "whFVLmp+qrX7ocRuZ2AIzxyxxY64tKignme9rDMhrdw="

ota:
  - platform: esphome
    password: "ceed369ffd7adda8848df617dc427247"

web_server:
  port: 80

# wifi:
#   ssid: !secret wifi_ssid
#   password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  # ap:
  #   ssid: "Headphones Fallback Hotspot"
  #   password: "nhHYeQkHQ3HL"

# captive_portal:

# GPIO35 (Input only, No Pull-up): drawer_detector_4

# GPIO32 (Internal Pull-up): drawer_detector_1
# GPIO33 (Internal Pull-up): drawer_detector_2
# GPIO17 (Internal Pull-up): drawer_detector_3
# GPIO04 (Internal Pull-up): pipe_detector_2
# GPIO14 (Internal Pull-up): pipe_detector_3
# GPIO36 (Input only, No Pull-up): pipe_detector_1
# GPIO39 (Input only, No Pull-up): 
# GPIO35 (Input only, No Pull-up): 
    
binary_sensor:
    
  - platform: gpio
    pin:
      number: GPIO32
      mode: INPUT_PULLUP
      # inverted: True
    id: drawer_detector_1
    name: "Drawer detector 1"
    device_class: door
    filters:
      - delayed_on: $on_delay
      - delayed_off: $off_delay

  - platform: gpio
    pin:
      number: GPIO33
      mode: INPUT_PULLUP
      # inverted: True
    id: drawer_detector_2
    name: "Drawer detector 2"
    device_class: door
    filters:
      - delayed_on: $on_delay
      - delayed_off: $off_delay  

  - platform: gpio
    pin:
      number: GPIO17
      mode: INPUT_PULLUP
      # inverted: True
    id: drawer_detector_3
    name: "Drawer detector 3"
    device_class: door
    filters:
      - delayed_on: $on_delay
      - delayed_off: $off_delay    

  - platform: gpio
    pin:
      number: GPIO35
    id: drawer_detector_4
    name: "Drawer detector 4"
    device_class: door
    filters:
      - delayed_on: $on_delay
      - delayed_off: $off_delay       

  - platform: gpio
    pin:
      number: GPIO39
      inverted: True
    id: pipe_detector_1
    name: "Pipe detector 1"
    device_class: occupancy
    filters:
      - delayed_on: $on_delay
      - delayed_off: $off_delay

  - platform: gpio
    pin:
      number: GPIO14
      mode: INPUT_PULLUP
      inverted: True
    id: pipe_detector_2
    name: "Pipe detector 2"
    device_class: occupancy
    filters:
      - delayed_on: $on_delay
      - delayed_off: $off_delay

  - platform: gpio
    pin:
      number: GPIO04
      mode: INPUT_PULLUP
      inverted: True
    id: pipe_detector_3
    name: "Pipe detector 3"
    device_class: occupancy
    filters:
      - delayed_on: $on_delay
      - delayed_off: $off_delay          

  - platform: status
    name: "Drawers status"

switch:
  - platform: restart
    name: "Drawers restart"

sensor:
  - platform: uptime
    name: "up"
    id: uptime_sec    

text_sensor:
  - platform: template
    name: Drawers uptime
    lambda: |-
      int seconds = (id(uptime_sec).state);
      int days = seconds / (24 * 3600);
      seconds = seconds % (24 * 3600); 
      int hours = seconds / 3600;
      seconds = seconds % 3600;
      int minutes = seconds /  60;
      seconds = seconds % 60;
      return { (std::to_string(days) +"d " + std::to_string(hours) +"h " + std::to_string(minutes) +"m "+ std::to_string(seconds) +"s") };
    icon: mdi:clock-start
    update_interval: 33s