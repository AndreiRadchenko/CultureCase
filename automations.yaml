        action: media_player.media_previous_track
        data: {}
      - target:
          entity_id: media_player.android_tv_192_168_1_184
        action: media_player.media_play_pause
  mode: restart
- id: '1772877043974'
  alias: 'Tablet: Check Battery'
  description: Перевіряє заряд планшета кожні 10 хвилин
  triggers:
  - trigger: time_pattern
    minutes: /10
  conditions: []
  actions:
  - target:
      entity_id: media_player.android_tv_192_168_1_184
    data:
      command: dumpsys battery
    action: androidtv.adb_command
  mode: single
  max: 10
- id: '1772922223356'
  alias: 'Tablet: Check Power Status'
  description: Перевіряє чи увімкнений планшет (mWakefulness)
  triggers:
  - minutes: /5
    trigger: time_pattern
  conditions:
  - condition: state
    entity_id: media_player.android_tv_192_168_1_184
    state: not in ['unavailable', 'unknown']
  actions:
  - target:
      entity_id: media_player.android_tv_192_168_1_184
    data:
      command: dumpsys power | grep mWakefulness
    action: androidtv.adb_command
  mode: single
  max: 10
- id: '1773213304908'
  alias: Tablet Volume
  description: Increace tablet volume inside drawer 4 when it's open
  triggers:
  - trigger: state
    entity_id:
    - binary_sensor.drawers_drawer_detector_4
    from:
    - 'off'
    to:
    - 'on'
    id: drawer_opened
  - trigger: state
    entity_id:
    - binary_sensor.drawers_drawer_detector_4
    from:
    - 'on'
    to:
    - 'off'
    id: drawer_closed
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - drawer_opened
      sequence:
      - action: media_player.volume_set
        metadata: {}
        target:
          entity_id: media_player.lenovo_tab_m10_3rd_gen
        data:
          volume_level: 0.7
      - action: switch.turn_on
        metadata: {}
        target:
          entity_id: switch.lenovo_tab_m10_3rd_gen_screen
        data: {}
    - conditions:
      - condition: trigger
        id:
        - drawer_closed
      sequence:
      - action: media_player.volume_set
        metadata: {}
        target:
          entity_id: media_player.lenovo_tab_m10_3rd_gen
        data:
          volume_level: 0
      - action: switch.turn_off
        metadata: {}
        target:
          entity_id: switch.lenovo_tab_m10_3rd_gen_screen
        data: {}
  mode: restart
