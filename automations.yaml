        id:
        - headphones_detected
      sequence:
      - action: script.fade_volume
        metadata: {}
        data:
          duration: 0.5
          target_player: media_player.headphones1
          target_volume: 0
  mode: restart
- id: '1768983893793'
  alias: Headphone 1 up volume
  description: Play audio on headphone 1 when it's taken
