- id: '1768978718354'
  alias: Drawer 1
  description: Play audio inside drawer 1 when it's open
  triggers:
  - trigger: state
    entity_id:
    - binary_sensor.drawers_drawer_detector_1
    from:
    - 'off'
    to:
    - 'on'
    id: drawer_opened
  - trigger: state
    entity_id:
    - binary_sensor.drawers_drawer_detector_1
    from:
    - 'on'
    to:
    - 'off'
    id: drawer_closed
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - drawer_opened
      sequence:
      - action: script.fade_volume
        metadata: {}
        data:
          target_player: media_player.drawer1
          target_volume: 0.8
          duration: 0.6
    - conditions:
      - condition: trigger
        id:
        - drawer_closed
      sequence:
      - action: script.fade_volume
        metadata: {}
        data:
          duration: 0.6
          target_player: media_player.drawer1
          target_volume: 0
  mode: restart
- id: '1768981772393'
  alias: Headphones 1
  description: Play audio on headphone 1 when it's taken
  triggers:
