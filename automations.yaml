    event: start
  conditions: []
  actions:
  - delay:
      hours: 0
      minutes: 2
      seconds: 0
      milliseconds: 0
  - action: scene.turn_on
    metadata: {}
    target:
      entity_id: scene.all_players_off
    data: {}
  - delay:
      hours: 0
      minutes: 0
      seconds: 5
      milliseconds: 0
  - action: scene.turn_on
    metadata: {}
    target:
      entity_id: scene.all_players_on_playing_0
    data:
      transition: 0.5
  mode: single
