- id: '1773478238272'
  alias: 'Tablet: Wake Up'
  description: Будить планшет кожні 10 хвилин
  triggers:
  - trigger: time_pattern
    minutes: /10
  conditions:
  - condition: time
    after: '22:10:00'
    before: 09:50:00
  actions:
  - target:
      entity_id: media_player.android_tv_192_168_1_184
    action: media_player.media_pause
  - delay:
      hours: 0
      minutes: 0
      seconds: 2
      milliseconds: 0
  - target:
      entity_id: media_player.android_tv_192_168_1_184
    action: media_player.media_play_play
  - action: notify.persistent_notification
    metadata: {}
    data:
      message: Wake up tablet
  mode: single
  max: 10
- id: '1774506792831'
  alias: Increment headphones1 takes
  description: ''
  triggers:
  - entity_id: binary_sensor.headphones_headphones_detector_6
    from: 'on'
    to: 'off'
    for:
      seconds: 5
    trigger: state
    id: increment_count
  - at: 00:00:00
    id: reset_count
    trigger: time
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - increment_count
      sequence:
      - action: counter.set_value
        target:
          entity_id: counter.day_count_headphones1
        data:
          value: "{{\n  (\n    states('counter.day_count_headphones6') | int(0)\n
            \   + states('counter.day_count_headphones2') | int(0)\n  ) / 2\n  + 0.5\n|
            int }}  \n"
    - conditions:
      - condition: trigger
        id:
        - reset_count
      sequence:
      - action: counter.reset
        target:
          entity_id: counter.day_count_headphones1
  mode: single
