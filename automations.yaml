          target_volume: 0
        enabled: false
      - action: media_player.volume_down
        metadata: {}
        target:
          entity_id: media_player.headphones1
        data: {}
        enabled: false
      - action: media_player.volume_set
        metadata: {}
        target:
          entity_id: media_player.headphones1
        data:
          volume_level: 0
  mode: single
