  - trigger: state
    entity_id:
    - binary_sensor.headphones_headphones_detector_1
    id: headphones_detected
    from:
    - 'off'
    to:
    - 'on'
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - headphones_taken
      sequence:
      - action: script.fade_volume
        metadata: {}
        data:
          duration: 0.5
          target_player: media_player.headphones1
          target_volume: '{{ states(''input_number.max_volume'') | float(0.7) }}'
    - conditions:
