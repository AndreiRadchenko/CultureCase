fade_volume:
  alias: Fade Volume
  mode: parallel
  max: 20
  fields:
    target_player:
      required: true
      selector:
        entity:
          domain: media_player
    target_volume:
      required: true
      selector:
        number:
          min: 0
          max: 1
          step: 0.01
    duration:
      default: 0.5
      selector:
        number:
          min: 0
          max: 5
          step: 0.1
  variables:
    steps_per_second: 20
    total_steps: '{{ (steps_per_second * duration) | int }}'
    start_volume: '{{ state_attr(target_player, ''volume_level'') | float(0) }}'
    start_diff: '{{ (target_volume - start_volume) | float(0) }}'
  sequence:
  - repeat:
      while:
      - condition: template
        value_template: '{{ repeat.index < total_steps }}'
      sequence:
      - target:
          entity_id: '{{ target_player }}'
        data:
          volume_level: '{% set t = repeat.index / total_steps %} {{ (start_volume
            + t * start_diff) | round(3) }}

            '
        action: media_player.volume_set
      - delay:
          milliseconds: 50
  - target:
      entity_id: '{{ target_player }}'
    data:
      volume_level: '{{ target_volume }}'
    action: media_player.volume_set
