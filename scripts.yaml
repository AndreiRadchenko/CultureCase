fade_volume:
  alias: Fade Volume
  mode: parallel
  max: 20
  fields:
    target_player:
      required: true
      selector:
        entity:
          domain: media_player
    target_volume:
      required: true
      selector:
        number:
          min: 0
          max: 1
          step: 0.01
    duration:
      default: 0.5
      selector:
        number:
          min: 0
          max: 5
          step: 0.1
  variables:
    steps_per_second: 20
    total_steps: '{{ (steps_per_second * duration) | int }}'
    start_volume: '{{ state_attr(target_player, ''volume_level'') | float(0) }}'
    start_diff: '{{ (target_volume - start_volume) | float(0) }}'
  sequence:
  - repeat:
      while:
      - condition: template
        value_template: '{{ repeat.index < total_steps }}'
      sequence:
      - target:
          entity_id: '{{ target_player }}'
        data:
          volume_level: '{% set t = repeat.index / total_steps %} {{ (start_volume
            + t * start_diff) | round(3) }}

            '
        action: media_player.volume_set
      - delay:
          milliseconds: 50
  - target:
      entity_id: '{{ target_player }}'
    data:
      volume_level: '{{ target_volume }}'
    action: media_player.volume_set
tablet_screen_off:
  sequence:
  - action: remote.send_command
    metadata: {}
    target:
      entity_id: remote.android_tv_192_168_1_184
    data:
      num_repeats: 1
      delay_secs: 0.4
      hold_secs: 0
      command: POWER
  alias: Tablet screen off
  description: ''
tablet_screen_on:
  alias: Tablet screen on
  sequence:
  - target:
      entity_id: media_player.android_tv_192_168_1_184
    data:
      command: POWER
    action: remote.send_command
  - delay: 00:00:01
  - target:
      entity_id: media_player.android_tv_192_168_1_184
    data:
      command: input keyevent KEYCODE_WAKEUP
    action: androidtv.adb_command
  icon: mdi:brightness-7
  mode: single
  description: ''
tablet_brightness_0:
  alias: Tablet brightness 0%
  sequence:
  - target:
      entity_id: media_player.android_tv_192_168_1_184
    data:
      command: settings put system screen_brightness 0
    action: androidtv.adb_command
  icon: mdi:brightness-1
  mode: single
  description: ''
tablet_brightness_80:
  alias: Tablet brightness 80
  sequence:
  - target:
      entity_id: media_player.android_tv_192_168_1_184
    data:
      command: settings put system screen_brightness 80
    action: androidtv.adb_command
  icon: mdi:brightness-1
  mode: single
  description: ''
tablet_check_battery_now:
  alias: 'Tablet: Check Battery Now'
  sequence:
  - target:
      entity_id: media_player.android_tv_192_168_1_184
    data:
      command: dumpsys battery
    action: androidtv.adb_command
  - delay: 00:00:02
  - data:
      title: Tablet Battery
      message: 'Заряд: {{ states(''sensor.tablet_battery_level'') }}% {%- if is_state(''sensor.tablet_charging_status'',
        ''on'') -%} ✅ Заряджається {%- else -%} ⚠️ Розряджається {%- endif -%}

        '
    action: persistent_notification.create
  mode: single
  description: ''
tablet_check_screen_now:
  alias: 'Tablet: Check Screen Now'
  sequence:
  - target:
      entity_id: media_player.android_tv_192_168_1_184
    data:
      command: dumpsys power | grep mWakefulness
    action: androidtv.adb_command
  - delay: 00:00:02
  - data:
      title: Tablet Screen
      message: 'Екран: {{ states(''binary_sensor.tablet_powered_on'') }}% {%- if is_state(''binary_sensor.tablet_powered_on'',
        ''on'') -%} ✅ Увікнений {%- else -%} ⚠️ Вимкнений {%- endif -%}

        '
    action: persistent_notification.create
  mode: single
  description: ''
